#cloud-config
packages:
  - python3-pip
  - python3-venv

write_files:
  - path: /etc/systemd/system/mitmproxy.service
    permissions: '0644'
    content: |
      [Unit]
      Description=mitmproxy transparent proxy
      After=network.target

      [Service]
      ExecStart=/opt/mitmproxy/bin/mitmdump
      Restart=on-failure
      User=nobody
      Group=nobody

      [Install]
      WantedBy=multi-user.target

runcmd:
  - python3 -m venv /opt/mitmproxy
  - /opt/mitmproxy/bin/pip install --quiet mitmproxy
  - ln -sf /opt/mitmproxy/bin/mitmproxy /usr/local/bin/mitmproxy
  - ln -sf /opt/mitmproxy/bin/mitmdump  /usr/local/bin/mitmdump
  - ln -sf /opt/mitmproxy/bin/mitmweb   /usr/local/bin/mitmweb
  - systemctl daemon-reload
  - systemctl enable --now mitmproxy
